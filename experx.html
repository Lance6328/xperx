<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experx Solutions | Industrial Drilling Excellence</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            scroll-behavior: smooth;
            background: #020617;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* HERO — active drilling rig on site */
        .hero-gradient {
            background:
                linear-gradient(to bottom, rgba(2,6,23,0.55), rgba(2,6,23,0.92)),
                url('https://images.pexels.com/photos/35592814/pexels-photo-35592814.jpeg?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* ABOUT — geologist in the field */
        .about-image {
            background:
                linear-gradient(to bottom, rgba(15,23,42,0.25), rgba(15,23,42,0.65)),
                url('https://images.pexels.com/photos/15391048/pexels-photo-15391048.jpeg?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* CONTACT — wide aerial of drilling site*/
        .contact-image {
            background:
                linear-gradient(to bottom, rgba(15,23,42,0.4), rgba(15,23,42,0.80)),
                url('https://images.pexels.com/photos/14840752/pexels-photo-14840752.jpeg?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .service-image {
            height: 220px;
            background-size: cover;
            background-position: center;
        }

        .chat-window {
            height: 520px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
        }

        @keyframes float {
            0%   { transform: translateY(0px); }
            50%  { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 4s ease-in-out infinite; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 1s ease; }

        .orange-glow { box-shadow: 0 0 50px rgba(234,88,12,0.25); }

        .service-card { transition: 0.4s ease; }
        .service-card:hover { transform: translateY(-8px); }
    </style>
</head>

<body class="bg-slate-950 text-slate-200">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

/* ---- NAVBAR ---- */
const Navbar = ({ setPage, currentPage }) => (
    <nav className="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center glass">
        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setPage('Home')}>
            <div className="w-11 h-11 rounded-xl bg-orange-600 flex items-center justify-center font-black text-white text-xl">X</div>
            <div>
                <h1 className="font-black text-2xl tracking-tight text-white uppercase">Experx</h1>
                <p className="text-[10px] uppercase tracking-[0.3em] text-slate-400">Solutions Ltd</p>
            </div>
        </div>

        <div className="hidden md:flex items-center gap-8 uppercase tracking-[0.2em] text-xs font-semibold">
            {['Home','Services','About','Contact'].map(item => (
                <button key={item} onClick={() => setPage(item)}
                    className={`transition hover:text-orange-500 ${currentPage === item ? 'text-orange-500' : 'text-slate-300'}`}>
                    {item}
                </button>
            ))}
        </div>

        <a href="tel:0702171733" className="bg-orange-600 hover:bg-orange-700 transition px-6 py-3 rounded-full font-bold text-sm text-white">
            Call Now
        </a>
    </nav>
);

/* ---- HOME ---- */
const HomePage = () => (
    <section className="hero-gradient min-h-screen relative flex items-center overflow-hidden">
        <div className="absolute inset-0 bg-black/40"></div>
        <div className="max-w-7xl mx-auto px-6 relative z-10 py-40">
            <div className="fade-in">
                <div className="inline-flex items-center gap-3 px-5 py-3 rounded-full glass border border-orange-600/20 mb-8">
                    <div className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                    <span className="text-orange-400 uppercase text-xs tracking-[0.3em] font-bold">Serving All 47 Counties</span>
                </div>

                <h1 className="text-6xl md:text-8xl font-black leading-[0.9] tracking-tight text-white mb-8">
                    RELIABLE <span className="text-orange-600">GROUNDWATER</span><br/>
                    SOLUTIONS IN <span className="italic font-light text-slate-300">KENYA.</span>
                </h1>

                <p className="text-slate-300 text-xl max-w-3xl leading-relaxed mb-12">
                    Experx Solutions provides advanced borehole drilling, hydro-geological surveys,
                    VES siting, yield testing, and industrial groundwater engineering services across Kenya.
                </p>

                <div className="flex flex-wrap gap-5">
                    <button className="bg-orange-600 hover:bg-orange-700 transition px-10 py-5 rounded-full font-black uppercase tracking-widest text-sm orange-glow">
                        Consult Our Geologists
                    </button>
                    <button className="glass border border-white/10 hover:bg-white hover:text-slate-950 transition px-10 py-5 rounded-full font-black uppercase tracking-widest text-sm">
                        Explore Services
                    </button>
                </div>
            </div>

            <div className="grid md:grid-cols-3 gap-6 mt-24">
                <div className="glass p-8 rounded-3xl">
                    <p className="text-orange-500 uppercase text-xs tracking-[0.3em] mb-3 font-bold">Fleet Capacity</p>
                    <h2 className="text-5xl font-black text-white">2 RIGS</h2>
                    <p className="mt-4 text-slate-400 text-sm">Active industrial drilling deployment across Kenya.</p>
                </div>
                <div className="glass p-8 rounded-3xl">
                    <p className="text-orange-500 uppercase text-xs tracking-[0.3em] mb-3 font-bold">Scientific Accuracy</p>
                    <h2 className="text-5xl font-black text-white">VES+</h2>
                    <p className="mt-4 text-slate-400 text-sm">Precision aquifer detection and groundwater mapping.</p>
                </div>
                <div className="glass p-8 rounded-3xl">
                    <p className="text-orange-500 uppercase text-xs tracking-[0.3em] mb-3 font-bold">Coverage</p>
                    <h2 className="text-5xl font-black text-white">47</h2>
                    <p className="mt-4 text-slate-400 text-sm">Counties covered nationwide.</p>
                </div>
            </div>
        </div>
    </section>
);

/* ---- SERVICES ----
   Each image is carefully matched to the service:
   1. VES Siting        → geophysical survey equipment in the field
   2. Rig Operations    → industrial drilling rig at work
   3. Hydro Surveys     → aerial river / watershed landscape
   4. Yield Testing     → pump pipe and flowing water
   5. NEMA Compliance   → green forest / environmental setting
   6. Water Quality Lab → scientist testing water sample in lab
*/
const services = [
    {
        title: "VES Siting",
        desc: "Scientific aquifer detection using advanced electrical resistivity technology.",
        image: "https://images.pexels.com/photos/36325307/pexels-photo-36325307.jpeg?q=80&w=2070&auto=format&fit=crop"
    },

    {
        title: "Rig Operations",
        desc: "Industrial-grade drilling operations supervised by certified professionals.",
        image: "https://images.pexels.com/photos/35592814/pexels-photo-35592814.jpeg?q=80&w=2070&auto=format&fit=crop"
    },

    {
        title: "Hydro Surveys",
        desc: "Advanced hydro-geological mapping and land surface analysis.",
        image: "https://images.pexels.com/photos/34247810/pexels-photo-34247810.jpeg?q=80&w=2070&auto=format&fit=crop"
    },

    {
        title: "Yield Testing",
        desc: "Comprehensive pump testing and water sustainability assessment.",
        image: "https://images.pexels.com/photos/31894978/pexels-photo-31894978.jpeg?q=80&w=2070&auto=format&fit=crop"
    },

    {
        title: "NEMA Compliance",
        desc: "Environmental licensing and water resource permit assistance.",
        image: "https://images.pexels.com/photos/12228588/pexels-photo-12228588.jpeg?q=80&w=2070&auto=format&fit=crop"
    },

    {
        title: "Water Quality Lab",
        desc: "Certified chemical and bacterial water quality analysis.",
        image: "https://images.pexels.com/photos/8113772/pexels-photo-8113772.jpeg?q=80&w=2070&auto=format&fit=crop"
    }
];

const ServicesPage = () => (
    <section className="pt-36 pb-28 px-6">
        <div className="max-w-7xl mx-auto">
            <div className="text-center mb-16">
                <p className="text-orange-500 uppercase tracking-[0.4em] text-xs font-bold mb-4">What We Do</p>
                <h2 className="text-5xl md:text-6xl font-black tracking-tight text-white mb-6">Professional Groundwater Services</h2>
                <p className="text-slate-400 max-w-3xl mx-auto text-lg leading-relaxed">
                    End-to-end groundwater engineering and industrial drilling solutions tailored for
                    institutions, industries, farms, and residential developments.
                </p>
            </div>

            <div className="grid md:grid-cols-3 gap-8">
                {services.map((service, index) => (
                    <div key={index} className="service-card glass rounded-[30px] overflow-hidden">
                        <div
                            className="service-image"
                            style={{ backgroundImage: `url(${service.image})` }}
                        ></div>
                        <div className="p-8">
                            <h3 className="text-2xl font-bold text-white mb-4">{service.title}</h3>
                            <p className="text-slate-400 leading-relaxed">{service.desc}</p>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    </section>
);

/* ---- ABOUT ----
   Background: engineer inspecting drill core samples / site work
*/
const AboutPage = () => (
    <section className="pt-36 pb-28 px-6">
        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center">
            <div>
                <p className="text-orange-500 uppercase tracking-[0.4em] text-xs font-bold mb-4">About Experx</p>
                <h2 className="text-5xl md:text-6xl font-black text-white leading-tight mb-8">
                    Engineering Sustainable Water Futures.
                </h2>
                <p className="text-slate-400 text-lg leading-relaxed mb-6">
                    Experx Solutions Ltd specializes in industrial borehole drilling, hydro-geological surveys,
                    groundwater engineering, and environmental compliance services throughout Kenya.
                </p>
                <p className="text-slate-500 leading-relaxed mb-10">
                    Our experienced geologists and drilling experts combine modern drilling technology with
                    scientific methodologies to deliver reliable and sustainable groundwater solutions.
                </p>
                <div className="flex gap-5 flex-wrap">
                    <div className="glass px-8 py-6 rounded-3xl">
                        <h3 className="text-4xl font-black text-orange-500">47</h3>
                        <p className="uppercase tracking-[0.3em] text-xs text-slate-400 mt-2">Counties</p>
                    </div>
                    <div className="glass px-8 py-6 rounded-3xl">
                        <h3 className="text-4xl font-black text-orange-500">24/7</h3>
                        <p className="uppercase tracking-[0.3em] text-xs text-slate-400 mt-2">Support</p>
                    </div>
                </div>
            </div>

            {/* About image: drilling crew / engineer on site */}
            <div
                className="rounded-[40px] min-h-[600px] border border-white/10 shadow-2xl shadow-orange-600/10"
                style={{
                    background: `linear-gradient(to bottom, rgba(15,23,42,0.2), rgba(15,23,42,0.65)),
                        url('https://images.pexels.com/photos/15391048/pexels-photo-15391048.jpeg?q=80&w=2070&auto=format&fit=crop')`,
                    backgroundSize: 'cover',
                    backgroundPosition: 'center'
                }}
            ></div>
        </div>
    </section>
);

/* ---- CONTACT ----
   Left panel: aerial view of African landscape / open terrain
*/
const ContactPage = () => (
    <section className="pt-36 pb-28 px-6">
        <div className="max-w-7xl mx-auto rounded-[40px] overflow-hidden grid md:grid-cols-2 glass border border-white/10">

            {/* Contact image: aerial African savanna / industrial area Nairobi */}
            <div
                className="min-h-[600px]"
                style={{
                    background: `linear-gradient(to bottom, rgba(15,23,42,0.35), rgba(15,23,42,0.75)),
                        url('https://images.pexels.com/photos/14840752/pexels-photo-14840752.jpeg?q=80&w=2070&auto=format&fit=crop')`,
                    backgroundSize: 'cover',
                    backgroundPosition: 'center'
                }}
            ></div>

            <div className="p-12 md:p-16 flex flex-col justify-center">
                <p className="text-orange-500 uppercase tracking-[0.4em] text-xs font-bold mb-5">Contact Us</p>
                <h2 className="text-5xl font-black text-white leading-tight mb-10">
                    Ready To Start Your Water Project?
                </h2>

                <div className="space-y-8">
                    <div>
                        <p className="text-slate-500 uppercase text-xs tracking-[0.3em] mb-2">Phone</p>
                        <p className="text-2xl font-bold text-white">0702171733</p>
                    </div>
                    <div>
                        <p className="text-slate-500 uppercase text-xs tracking-[0.3em] mb-2">Email</p>
                        <p className="text-2xl font-bold text-white">experxsolution@gmail.com</p>
                    </div>
                    <div>
                        <p className="text-slate-500 uppercase text-xs tracking-[0.3em] mb-2">Location</p>
                        <p className="text-2xl font-bold text-white">Industrial Area, Nairobi</p>
                    </div>
                </div>

                <button className="mt-12 bg-orange-600 hover:bg-orange-700 transition px-10 py-5 rounded-full font-black uppercase tracking-widest text-sm w-fit">
                    Request Consultation
                </button>
            </div>
        </div>
    </section>
);

/* ---- CHATBOT ---- */
const Chatbot = () => {
    const [isOpen, setIsOpen] = useState(false);
    const [messages, setMessages] = useState([
        { text: "Jambo! Welcome to Experx Solutions. How can we help you today?", sender: "bot" }
    ]);
    const [input, setInput] = useState("");
    const chatRef = useRef(null);

    useEffect(() => { chatRef.current?.scrollTo(0, chatRef.current.scrollHeight); }, [messages]);

    const handleSend = (text) => {
        if (!text.trim()) return;
        setMessages(prev => [...prev, { text, sender: "user" }]);
        setTimeout(() => {
            let response = "Please contact us directly at 0702171733 for detailed assistance.";
            if (text.toLowerCase().includes("rig"))   response = "Our drilling rigs are currently available for projects across Kenya.";
            if (text.toLowerCase().includes("water")) response = "We provide borehole drilling, hydro surveys, and groundwater solutions.";
            if (text.toLowerCase().includes("nema"))  response = "Yes, we assist clients with full NEMA and WRA compliance.";
            setMessages(prev => [...prev, { text: response, sender: "bot" }]);
        }, 700);
    };

    return (
        <div className="fixed bottom-8 right-8 z-[100]">
            {isOpen ? (
                <div className="chat-window glass rounded-[30px] overflow-hidden flex flex-col border border-white/10">
                    <div className="bg-orange-600 p-5 flex justify-between items-center">
                        <div>
                            <h3 className="font-bold text-white uppercase tracking-widest text-sm">Experx Assistant</h3>
                            <p className="text-white/70 text-xs mt-1">Online Support</p>
                        </div>
                        <button onClick={() => setIsOpen(false)} className="text-white text-xl">✕</button>
                    </div>

                    <div ref={chatRef} className="flex-1 p-5 overflow-y-auto space-y-4">
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] px-5 py-3 rounded-2xl text-sm ${
                                    msg.sender === 'user' ? 'bg-orange-600 text-white' : 'bg-slate-800 text-slate-200'
                                }`}>{msg.text}</div>
                            </div>
                        ))}
                    </div>

                    <div className="p-4 bg-slate-900 flex gap-3">
                        <input
                            type="text" value={input} placeholder="Type a message..."
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={(e) => { if (e.key === 'Enter') { handleSend(input); setInput(""); } }}
                            className="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none"
                        />
                        <button onClick={() => { handleSend(input); setInput(""); }}
                            className="bg-orange-600 hover:bg-orange-700 transition px-5 rounded-xl">➤</button>
                    </div>
                </div>
            ) : (
                <button onClick={() => setIsOpen(true)}
                    className="w-16 h-16 rounded-full bg-orange-600 hover:bg-orange-700 transition flex items-center justify-center text-2xl shadow-2xl floating">
                    💬
                </button>
            )}
        </div>
    );
};

/* ---- APP ---- */
function App() {
    const [page, setPage] = useState('Home');
    return (
        <div className="bg-slate-950 min-h-screen">
            <Navbar setPage={setPage} currentPage={page} />
            <main>
                {page === 'Home'     && <HomePage />}
                {page === 'Services' && <ServicesPage />}
                {page === 'About'    && <AboutPage />}
                {page === 'Contact'  && <ContactPage />}
            </main>
            <Chatbot />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
